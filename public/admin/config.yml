# Sveltia CMS configuration
# Docs: https://github.com/sveltia/sveltia-cms
#
# CHANGE `repo` to your actual GitHub repository (owner/name).
backend:
  name: github
  repo: blueleaflabs/website     # <-- set to your repo, e.g. blueleaflabs/blueleaflabs.org
  branch: main
  # base_url is the OAuth relay that lets you log in with GitHub.
  # See the deploy guide (README) to deploy sveltia-cms-auth as a Cloudflare Worker
  # and paste its URL here:
  # base_url: https://your-auth-worker.workers.dev

# Uploaded images land here and are referenced by URL in content.
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: research
    label: Research
    label_singular: Research entry
    folder: "src/content/research"
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    summary: "{{title}} ({{status}})"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: kind, label: Kind, widget: select, options: ["project", "analysis"], default: "project" }
      - { name: status, label: Status, widget: select, options: ["Active", "Iterating", "Complete", "Planned"], default: "Active" }
      - { name: summary, label: One-line summary (used on cards), widget: text }
      - { name: question, label: Research question, widget: text, required: false }
      - { name: methods, label: Primary methods, widget: text, required: false }
      - { name: dataSources, label: Data sources, widget: text, required: false }
      - { name: outputs, label: Outputs, widget: text, required: false }
      - { name: repo, label: GitHub repo URL, widget: string, required: false }
      - label: Publications
        name: publications
        widget: list
        required: false
        fields:
          - { name: label, label: "Label (e.g. Preprint, ARCH 2026)", widget: string, required: false }
          - { name: url, label: URL, widget: string }
      - label: "Gallery (2x2 photos)"
        name: gallery
        widget: list
        required: false
        fields:
          - { name: src, label: Image, widget: image }
          - { name: alt, label: "Alt text (accessibility)", widget: string, required: false }
          - { name: caption, label: "Caption (optional, shown under photo)", widget: string, required: false }
      - label: "Video hero (YouTube)"
        name: videos
        widget: list
        required: false
        fields:
          - { name: label, label: "Label (e.g. Explainer)", widget: string, required: false }
          - { name: url, label: "YouTube URL", widget: string }
      - { name: highlights, label: "Key points (2-4 plain-language highlights)", widget: list, required: false }
      - label: Awards
        name: awards
        widget: list
        required: false
        fields:
          - { name: title, label: Title, widget: string }
          - { name: venue, label: Venue, widget: string, required: false }
          - { name: year, label: Year, widget: string, required: false }
      - { name: imagePrefix, label: "Image prefix (files: <prefix>-1 hero, -2, -3, ...)", widget: string, required: false }
      - { name: heroAlt, label: "Hero image alt text", widget: string, required: false }
      - { name: order, label: Sort order, widget: number, default: 50, value_type: int }
      - { name: published, label: Published, widget: boolean, default: true }
      - { name: body, label: Narrative, widget: markdown }

  - name: updates
    label: Project log
    label_singular: Update
    folder: "src/content/updates"
    create: true
    extension: mdx
    format: frontmatter
    identifier_field: title
    slug: "{{slug}}"
    sortable_fields: [date]
    fields:
      - { name: project, label: Project, widget: relation, collection: research, search_fields: ["title"], value_field: "{{slug}}", display_fields: ["title"] }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: title, label: Title, widget: string }
      - { name: kind, label: "Kind (note = inline, post = own page)", widget: select, options: ["note", "post"], default: "note" }
      - { name: summary, label: "Summary (shown on post cards)", widget: text, required: false }
      - { name: published, label: Published, widget: boolean, default: true }
      - { name: body, label: Body, widget: markdown }

  - name: posts
    label: Writing (The Measured View)
    label_singular: Post
    folder: "src/content/posts"
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    slug: "{{slug}}"
    sortable_fields: [date]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: tag, label: Tag, widget: string, default: "Commentary" }
      - { name: readingTime, label: Reading time, widget: string, required: false }
      - { name: summary, label: Summary / dek, widget: text }
      - { name: imagePrefix, label: "Image prefix (files: <prefix>-1 hero, -2, -3, ...)", widget: string, required: false }
      - { name: heroAlt, label: "Hero image alt text", widget: string, required: false }
      - { name: published, label: Published, widget: boolean, default: true }
      - { name: body, label: Body, widget: markdown }

  - name: workshops
    label: Watt Workshops
    label_singular: Workshop
    folder: "src/content/workshops"
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    fields:
      - { name: title, label: Title, widget: string }
      - { name: summary, label: One-line summary, widget: text }
      - { name: audience, label: Audience, widget: string, required: false }
      - { name: level, label: Level, widget: string, required: false }
      - { name: format, label: Format, widget: string, required: false }
      - { name: duration, label: Duration, widget: string, required: false }
      - { name: location, label: Location, widget: string, required: false }
      - { name: nextSession, label: Next session, widget: string, required: false }
      - { name: materials, label: Materials, widget: string, required: false }
      - label: "Video hero (YouTube)"
        name: videos
        widget: list
        required: false
        fields:
          - { name: label, label: "Label (e.g. Explainer)", widget: string, required: false }
          - { name: url, label: "YouTube URL", widget: string }
      - { name: imagePrefix, label: "Image prefix (files: <prefix>-1 hero, -2, -3, ...)", widget: string, required: false }
      - { name: heroAlt, label: "Hero image alt text", widget: string, required: false }
      - { name: order, label: Sort order, widget: number, default: 50, value_type: int }
      - { name: published, label: Published, widget: boolean, default: true }
      - { name: body, label: Details, widget: markdown }

  - name: talks
    label: Talks & Interviews
    label_singular: Talk
    folder: "src/content/talks"
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    sortable_fields: [date]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: summary, label: One-line summary, widget: text }
      - { name: event, label: Event, widget: string, required: false }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { name: location, label: Location, widget: string, required: false }
      - { name: audience, label: Audience, widget: string, required: false }
      - { name: topic, label: Topic, widget: string, required: false }
      - { name: slidesUrl, label: Slides URL, widget: string, required: false }
      - { name: videoUrl, label: Video URL, widget: string, required: false }
      - { name: interviewOutlet, label: Interview outlet, widget: string, required: false }
      - { name: interviewFormat, label: Interview format, widget: string, required: false }
      - { name: interviewUrl, label: Interview URL, widget: string, required: false }
      - label: "Video hero (YouTube)"
        name: videos
        widget: list
        required: false
        fields:
          - { name: label, label: "Label (e.g. Explainer)", widget: string, required: false }
          - { name: url, label: "YouTube URL", widget: string }
      - { name: imagePrefix, label: "Image prefix (files: <prefix>-1 hero, -2, -3, ...)", widget: string, required: false }
      - { name: heroAlt, label: "Hero image alt text", widget: string, required: false }
      - { name: published, label: Published, widget: boolean, default: true }
      - { name: body, label: Details, widget: markdown }
